<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeNest Admin - Inbound Trunks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://feathericons.com/feather.css">
    <link rel="stylesheet" href="../assets/styles/main.css">
    <script src="/assets/config/runtime-config.js"></script>
</head>
<body class="bg-gray-50" data-active-nav="trunks-inbound">
    <div id="app-root"></div>

    <template id="page-content-template">
        <main class="flex-1 overflow-auto">
            <div class="md:hidden bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4 sticky top-0 z-40">
                <button id="mobile-menu-open" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <i data-feather="menu" class="w-6 h-6 text-gray-500"></i>
                </button>
                <h1 class="text-xl font-bold text-gray-900">CreativeNest</h1>
            </div>

            <div class="p-4 md:p-8">
                <div class="mb-8">
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Inbound Trunks</h1>
                    <p class="text-gray-600 mt-2">View and manage inbound SIP trunks and routing rules</p>
                </div>

                <!-- Inbound Trunks Section -->
                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                            <i data-feather="arrow-down-circle" class="w-5 h-5 text-blue-500"></i>
                            Inbound Trunks
                        </h2>
                        <button
                            id="inbound-create-btn"
                            type="button"
                            class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1"
                        >
                            <i data-feather="plus" class="w-4 h-4"></i>
                            <span>New Inbound Trunk</span>
                        </button>
                    </div>

                    <!-- Search Bar -->
                    <div class="mb-6 flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
                        <div class="flex-1 relative">
                            <input
                                type="text"
                                id="search-input"
                                placeholder="Search inbound trunks..."
                                class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            >
                            <i data-feather="search" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- Loading -->
                    <div id="inbound-loading" class="text-center py-8">
                        <div class="inline-block">
                            <div class="w-8 h-8 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
                        </div>
                        <p class="text-gray-600 mt-4">Loading inbound trunks...</p>
                    </div>

                    <!-- Cards Grid -->
                    <div id="inbound-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 hidden">
                        <!-- Inbound trunk cards injected by trunks_inbound.js -->
                    </div>

                    <!-- Empty State -->
                    <div id="inbound-empty-state" class="text-center py-8 hidden">
                        <i data-feather="inbox" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
                        <p class="text-gray-700 mb-1">No inbound trunks found</p>
                        <p class="text-gray-500 text-sm">Configure trunks from your LiveKit console.</p>
                    </div>

                    <!-- Error State -->
                    <div id="inbound-error-state" class="text-center py-8 hidden">
                        <i data-feather="alert-circle" class="w-10 h-10 text-red-300 mx-auto mb-3"></i>
                        <p class="text-gray-700 mb-3" id="inbound-error-message">Unable to load inbound trunks.</p>
                        <button id="inbound-retry-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Try again</button>
                    </div>
                </section>

                <!-- Inbound Edit Panel -->
                <div id="inbound-edit-panel" class="mt-10 bg-white border border-gray-200 rounded-xl shadow-sm p-6 hidden">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <i data-feather="edit-2" class="w-5 h-5 text-blue-500"></i>
                        Inbound Trunk Configuration
                    </h2>

                    <!-- General fields (name, credentials, metadata) -->
                    <form id="inbound-general-form" class="space-y-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <input type="text" id="edit-trunk-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Auth Username (optional)</label>
                                <input type="text" id="edit-auth-username" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Auth Password (optional)</label>
                                <input type="password" id="edit-auth-password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Metadata (optional)</label>
                            <textarea id="edit-metadata" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm" placeholder='Optional metadata string or JSON'></textarea>
                        </div>
                        <div class="flex justify-end pt-2">
                            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Save General Settings</button>
                        </div>
                    </form>

                    <!-- Numbers management -->
                    <div class="border-t border-gray-100 pt-6 mt-4">
                        <div class="flex items-center justify-between mb-3">
                            <div>
                                <h3 class="text-sm font-semibold text-gray-900">Numbers</h3>
                                <p class="text-xs text-gray-500">Manage the primary numbers configured on this trunk.</p>
                            </div>
                        </div>
                        <div id="inbound-numbers-list" class="flex flex-wrap gap-2 mb-3 text-sm"></div>
                        <form id="inbound-numbers-form" class="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
                            <input type="text" id="edit-numbers-to-add" placeholder="Comma-separated numbers to add" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            <button type="submit" class="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium hover:bg-blue-100">Add Numbers</button>
                        </form>
                    </div>

                    <!-- Allowed numbers management -->
                    <div class="border-t border-gray-100 pt-6 mt-6">
                        <div class="flex items-center justify-between mb-3">
                            <div>
                                <h3 class="text-sm font-semibold text-gray-900">Allowed Numbers</h3>
                                <p class="text-xs text-gray-500">Only calls from these numbers will be allowed when configured.</p>
                            </div>
                        </div>
                        <div id="inbound-allowed-numbers-list" class="flex flex-wrap gap-2 mb-3 text-sm"></div>
                        <form id="inbound-allowed-form" class="space-y-2">
                            <label class="block text-xs font-medium text-gray-700">Allowed numbers (full list)</label>
                            <input type="text" id="edit-allowed-numbers" placeholder='Comma-separated allowed numbers, or "*" for all' class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            <div class="flex justify-end">
                                <button type="submit" class="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium hover:bg-blue-100">Save Allowed Numbers</button>
                            </div>
                        </form>
                    </div>

                    <!-- Allowed addresses management -->
                    <div class="border-t border-gray-100 pt-6 mt-6">
                        <div class="flex items-center justify-between mb-3">
                            <div>
                                <h3 class="text-sm font-semibold text-gray-900">Allowed Addresses</h3>
                                <p class="text-xs text-gray-500">Only calls from these SIP source addresses will be allowed when configured.</p>
                            </div>
                        </div>
                        <div id="inbound-allowed-addresses-list" class="flex flex-wrap gap-2 mb-3 text-sm"></div>
                        <form id="inbound-allowed-addresses-form" class="space-y-2">
                            <label class="block text-xs font-medium text-gray-700">Allowed addresses (full list)</label>
                            <input type="text" id="edit-allowed-addresses" placeholder='Comma-separated hostnames or IPs, or "*" for all' class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            <div class="flex justify-end">
                                <button type="submit" class="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium hover:bg-blue-100">Save Allowed Addresses</button>
                            </div>
                        </form>
                    </div>

                    <!-- Advanced / danger zone (for now just Krisp toggle) -->
                    <div class="border-t border-gray-100 pt-6 mt-6">
                        <div class="flex items-center justify-between mb-3">
                            <div>
                                <h3 class="text-sm font-semibold text-gray-900 flex items-center gap-2">
                                    <i data-feather="zap" class="w-4 h-4 text-yellow-500"></i>
                                    Advanced
                                </h3>
                                <p class="text-xs text-gray-500">Noise reduction is applied at the trunk level using LiveKit's Krisp setting.</p>
                            </div>
                        </div>
                        <div class="flex items-center justify-between">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Noise Reduction (Krisp)</label>
                                <p class="text-xs text-gray-500">Changes here may replace the trunk configuration in LiveKit.</p>
                            </div>
                            <button type="button" id="edit-krisp-toggle" class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer items-center rounded-full border-2 border-transparent bg-gray-200 transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2" aria-pressed="false">
                                <span class="sr-only">Toggle noise reduction</span>
                                <span class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-0"></span>
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-end gap-3 pt-6 mt-6 border-t border-gray-100">
                        <button type="button" id="inbound-edit-cancel" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Close</button>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <div id="toast" class="fixed bottom-4 right-4 left-4 sm:left-auto px-6 py-3 bg-gray-900 text-white rounded-lg shadow-lg hidden z-50 text-center sm:text-left" role="alert">
        <p id="toast-message"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="../assets/scripts/config.js?v=1"></script>
    <script src="../assets/scripts/api.js?v=3"></script>
    <script src="../assets/scripts/ui.js"></script>
    <script src="../assets/scripts/layout.js"></script>
    <script src="../assets/scripts/trunks_inbound.js"></script>
</body>
</html>
