<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeNest Admin - Trunks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://feathericons.com/feather.css">
    <link rel="stylesheet" href="../assets/styles/main.css">
    <script src="/assets/config/runtime-config.js"></script>
</head>
<body class="bg-gray-50" data-active-nav="trunks">
    <div id="app-root"></div>

    <template id="page-content-template">
        <!-- Main Content Area -->
        <main class="flex-1 overflow-auto">
            <!-- Mobile Header -->
            <div class="md:hidden bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4 sticky top-0 z-40">
                <button id="mobile-menu-open" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <i data-feather="menu" class="w-6 h-6 text-gray-500"></i>
                </button>
                <h1 class="text-xl font-bold text-gray-900">CreativeNest</h1>
            </div>

            <!-- Trunks Page Content -->
            <div class="p-4 md:p-8">
                <!-- Header -->
                <div class="mb-8">
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Trunks</h1>
                    <p class="text-gray-600 mt-2">View and manage SIP trunks and inbound routing</p>
                </div>

                <!-- Inbound & Outbound Sections -->
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
                    <!-- Inbound Trunks -->
                    <section>
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                                <i data-feather="arrow-down-circle" class="w-5 h-5 text-blue-500"></i>
                                Inbound Trunks
                            </h2>
                        </div>

                        <!-- Loading -->
                        <div id="inbound-loading" class="text-center py-8">
                            <div class="inline-block">
                                <div class="w-8 h-8 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
                            </div>
                            <p class="text-gray-600 mt-4">Loading inbound trunks...</p>
                        </div>

                        <!-- Error -->
                        <div id="inbound-error-state" class="text-center py-8 hidden">
                            <i data-feather="alert-circle" class="w-10 h-10 text-red-300 mx-auto mb-3"></i>
                            <p class="text-gray-700 mb-3" id="inbound-error-message">Unable to load inbound trunks.</p>
                            <button id="inbound-retry-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Try again</button>
                        </div>

                        <!-- Empty -->
                        <div id="inbound-empty-state" class="text-center py-8 hidden">
                            <i data-feather="inbox" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
                            <p class="text-gray-700 mb-1">No inbound trunks found</p>
                            <p class="text-gray-500 text-sm">Configure trunks from your LiveKit console.</p>
                        </div>

                        <!-- Inbound Table -->
                        <div id="inbound-table-wrapper" class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden hidden">
                            <table class="min-w-full divide-y divide-gray-200 text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Numbers</th>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Allowed</th>
                                        <th class="px-4 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="inbound-trunks-body" class="divide-y divide-gray-100 bg-white">
                                    <!-- Rows injected by trunks.js -->
                                </tbody>
                            </table>
                        </div>
                    </section>

                    <!-- Outbound Trunks -->
                    <section>
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                                <i data-feather="arrow-up-circle" class="w-5 h-5 text-green-500"></i>
                                Outbound Trunks
                            </h2>
                        </div>

                        <!-- Loading -->
                        <div id="outbound-loading" class="text-center py-8">
                            <div class="inline-block">
                                <div class="w-8 h-8 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
                            </div>
                            <p class="text-gray-600 mt-4">Loading outbound trunks...</p>
                        </div>

                        <!-- Error -->
                        <div id="outbound-error-state" class="text-center py-8 hidden">
                            <i data-feather="alert-circle" class="w-10 h-10 text-red-300 mx-auto mb-3"></i>
                            <p class="text-gray-700 mb-3" id="outbound-error-message">Unable to load outbound trunks.</p>
                            <button id="outbound-retry-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Try again</button>
                        </div>

                        <!-- Empty -->
                        <div id="outbound-empty-state" class="text-center py-8 hidden">
                            <i data-feather="inbox" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
                            <p class="text-gray-700 mb-1">No outbound trunks found</p>
                            <p class="text-gray-500 text-sm">Configure trunks from your LiveKit console.</p>
                        </div>

                        <!-- Outbound Table -->
                        <div id="outbound-table-wrapper" class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden hidden">
                            <table class="min-w-full divide-y divide-gray-200 text-sm">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">ID</th>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Numbers</th>
                                        <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Allowed</th>
                                    </tr>
                                </thead>
                                <tbody id="outbound-trunks-body" class="divide-y divide-gray-100 bg-white">
                                    <!-- Rows injected by trunks.js -->
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <!-- Inbound Edit Panel -->
                <div id="inbound-edit-panel" class="mt-10 bg-white border border-gray-200 rounded-xl shadow-sm p-6 hidden">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <i data-feather="edit-2" class="w-5 h-5 text-blue-500"></i>
                        Edit Inbound Trunk
                    </h2>
                    <form id="inbound-edit-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Trunk ID</label>
                            <input type="text" id="edit-trunk-id" class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 text-gray-600 text-sm" readonly>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <input type="text" id="edit-trunk-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Numbers to Add</label>
                            <input type="text" id="edit-numbers-to-add" placeholder="Comma-separated numbers" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Allowed Numbers</label>
                            <input type="text" id="edit-allowed-numbers" placeholder="Comma-separated numbers" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                        </div>
                        <div class="flex justify-end gap-3 pt-2">
                            <button type="button" id="inbound-edit-cancel" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Cancel</button>
                            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </template>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 left-4 sm:left-auto px-6 py-3 bg-gray-900 text-white rounded-lg shadow-lg hidden z-50 text-center sm:text-left" role="alert">
        <p id="toast-message"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="../assets/scripts/config.js?v=1"></script>
    <script src="../assets/scripts/api.js?v=3"></script>
    <script src="../assets/scripts/ui.js"></script>
    <script src="../assets/scripts/layout.js"></script>
    <script src="../assets/scripts/trunks.js"></script>
</body>
</html>
