<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeNest Admin - Dispatch Rules</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://feathericons.com/feather.css">
    <link rel="stylesheet" href="../assets/styles/main.css">
    <script src="/assets/config/runtime-config.js"></script>
</head>
<body class="bg-gray-50" data-active-nav="trunks-dispatch">
    <div id="app-root"></div>

    <template id="page-content-template">
        <main class="flex-1 overflow-auto">
            <div class="md:hidden bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4 sticky top-0 z-40">
                <button id="mobile-menu-open" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <i data-feather="menu" class="w-6 h-6 text-gray-500"></i>
                </button>
                <h1 class="text-xl font-bold text-gray-900">CreativeNest</h1>
            </div>

            <div class="p-4 md:p-8">
                <div class="mb-8">
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Dispatch Rules</h1>
                    <p class="text-gray-600 mt-2">View LiveKit SIP dispatch rules and routing configuration</p>
                </div>

                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                            <i data-feather="git-branch" class="w-5 h-5 text-purple-500"></i>
                            Dispatch Rules
                        </h2>
                        <button
                            id="dispatch-create-btn"
                            type="button"
                            class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1"
                        >
                            <i data-feather="plus" class="w-4 h-4"></i>
                            <span>New Dispatch Rule</span>
                        </button>
                    </div>

                    <!-- Search Bar -->
                    <div class="mb-6 flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
                        <div class="flex-1 relative">
                            <input
                                type="text"
                                id="search-input"
                                placeholder="Search dispatch rules..."
                                class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            >
                            <i data-feather="search" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- Loading -->
                    <div id="dispatch-loading" class="text-center py-8">
                        <div class="inline-block">
                            <div class="w-8 h-8 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
                        </div>
                        <p class="text-gray-600 mt-4">Loading dispatch rules...</p>
                    </div>

                    <!-- Cards Grid -->
                    <div id="dispatch-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 hidden">
                        <!-- Dispatch rule cards injected by trunks_dispatch.js -->
                    </div>

                    <!-- Empty State -->
                    <div id="dispatch-empty-state" class="text-center py-8 hidden">
                        <i data-feather="inbox" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
                        <p class="text-gray-700 mb-1">No dispatch rules found</p>
                        <p class="text-gray-500 text-sm">Configure rules from your LiveKit console.</p>
                    </div>

                    <!-- Error State -->
                    <div id="dispatch-error-state" class="text-center py-8 hidden">
                        <i data-feather="alert-circle" class="w-10 h-10 text-red-300 mx-auto mb-3"></i>
                        <p class="text-gray-700 mb-3" id="dispatch-error-message">Unable to load dispatch rules.</p>
                        <button id="dispatch-retry-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Try again</button>
                    </div>
                </section>

                <!-- Dispatch Create Panel -->
                <div id="dispatch-create-panel" class="mt-10 bg-white border border-gray-200 rounded-xl shadow-sm p-6 hidden">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <i data-feather="plus-circle" class="w-5 h-5 text-blue-500"></i>
                        Create Dispatch Rule
                    </h2>

                    <form id="dispatch-create-form" class="space-y-6">
                        <div>
                            <label for="dispatch-create-name" class="block text-sm font-medium text-gray-700 mb-2">Name</label>
                            <input
                                type="text"
                                id="dispatch-create-name"
                                placeholder="e.g., Inbound Routing"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                        </div>

                        <div>
                            <label for="dispatch-create-room-prefix" class="block text-sm font-medium text-gray-700 mb-2">Room Prefix (individual rule)</label>
                            <input
                                type="text"
                                id="dispatch-create-room-prefix"
                                placeholder="call-"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                            <p class="text-xs text-gray-500 mt-2">Create uses an individual rule. To configure a direct rule, create first and then edit.</p>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold text-gray-900 mb-2">Inbound Trunk IDs</h3>
                            <div id="dispatch-create-trunk-ids" class="flex flex-wrap gap-2 mb-3 text-sm"></div>
                            <div class="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
                                <select
                                    id="dispatch-create-trunk-select"
                                    class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm bg-white"
                                >
                                    <option value="">Loading inbound trunks...</option>
                                </select>
                                <button
                                    type="button"
                                    id="dispatch-create-trunk-add-btn"
                                    class="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium hover:bg-blue-100"
                                >
                                    Add Trunk
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">Inbound trunk selection is required.</p>
                        </div>

                        <div>
                            <h3 class="text-sm font-semibold text-gray-900 mb-2">Agents</h3>
                            <div id="dispatch-create-agents" class="flex flex-wrap gap-2 mb-3 text-sm"></div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label for="dispatch-create-agent-name" class="block text-xs font-medium text-gray-700 mb-1">Agent Name</label>
                                    <input
                                        type="text"
                                        id="dispatch-create-agent-name"
                                        placeholder="e.g., livekit-realtime"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                                    >
                                </div>
                                <div>
                                    <label for="dispatch-create-agent-metadata" class="block text-xs font-medium text-gray-700 mb-1">Agent Metadata (optional)</label>
                                    <input
                                        type="text"
                                        id="dispatch-create-agent-metadata"
                                        placeholder="Optional"
                                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                                    >
                                </div>
                            </div>
                            <div class="flex justify-end mt-2">
                                <button
                                    type="button"
                                    id="dispatch-create-agent-add-btn"
                                    class="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium hover:bg-blue-100"
                                >
                                    Add Agent
                                </button>
                            </div>
                            <p class="text-xs text-gray-500 mt-2">Agents are required and will replace the list on edit updates.</p>
                        </div>

                        <div class="flex justify-end gap-3 pt-6 border-t border-gray-100">
                            <button
                                type="button"
                                id="dispatch-create-cancel"
                                class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50"
                            >
                                Close
                            </button>
                            <button
                                type="submit"
                                id="dispatch-create-save"
                                class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 inline-flex items-center gap-2"
                            >
                                <i data-feather="check" class="w-4 h-4"></i>
                                <span>Create Rule</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </template>

    <div id="toast" class="fixed bottom-4 right-4 left-4 sm:left-auto px-6 py-3 bg-gray-900 text-white rounded-lg shadow-lg hidden z-50 text-center sm:text-left" role="alert">
        <p id="toast-message"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="../assets/scripts/config.js?v=1"></script>
    <script src="../assets/scripts/api.js?v=3"></script>
    <script src="../assets/scripts/ui.js"></script>
    <script src="../assets/scripts/layout.js"></script>
    <script src="../assets/scripts/trunks_dispatch.js"></script>
</body>
</html>
