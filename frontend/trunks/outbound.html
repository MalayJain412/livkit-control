<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativeNest Admin - Outbound Trunks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://feathericons.com/feather.css">
    <link rel="stylesheet" href="../assets/styles/main.css">
    <script src="/assets/config/runtime-config.js"></script>
</head>
<body class="bg-gray-50" data-active-nav="trunks-outbound">
    <div id="app-root"></div>

    <template id="page-content-template">
        <main class="flex-1 overflow-auto">
            <div class="md:hidden bg-white border-b border-gray-200 px-6 py-4 flex items-center gap-4 sticky top-0 z-40">
                <button id="mobile-menu-open" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <i data-feather="menu" class="w-6 h-6 text-gray-500"></i>
                </button>
                <h1 class="text-xl font-bold text-gray-900">CreativeNest</h1>
            </div>

            <div class="p-4 md:p-8">
                <div class="mb-8">
                    <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Outbound Trunks</h1>
                    <p class="text-gray-600 mt-2">View and manage outbound SIP trunks</p>
                </div>

                <section>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-gray-900 flex items-center gap-2">
                            <i data-feather="arrow-up-circle" class="w-5 h-5 text-green-500"></i>
                            Outbound Trunks
                        </h2>
                        <button
                            id="outbound-create-btn"
                            type="button"
                            class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1"
                        >
                            <i data-feather="plus" class="w-4 h-4"></i>
                            <span>New Outbound Trunk</span>
                        </button>
                    </div>

                    <!-- Search Bar -->
                    <div class="mb-6 flex flex-col sm:flex-row gap-4 items-stretch sm:items-center">
                        <div class="flex-1 relative">
                            <input
                                type="text"
                                id="search-input"
                                placeholder="Search outbound trunks..."
                                class="w-full px-4 py-3 pl-10 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                            >
                            <i data-feather="search" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                        </div>
                    </div>

                    <!-- Loading -->
                    <div id="outbound-loading" class="text-center py-8">
                        <div class="inline-block">
                            <div class="w-8 h-8 border-4 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
                        </div>
                        <p class="text-gray-600 mt-4">Loading outbound trunks...</p>
                    </div>

                    <!-- Cards Grid -->
                    <div id="outbound-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 hidden">
                        <!-- Outbound trunk cards injected by trunks_outbound.js -->
                    </div>

                    <!-- Empty State -->
                    <div id="outbound-empty-state" class="text-center py-8 hidden">
                        <i data-feather="inbox" class="w-10 h-10 text-gray-300 mx-auto mb-3"></i>
                        <p class="text-gray-700 mb-1">No outbound trunks found</p>
                        <p class="text-gray-500 text-sm">Configure trunks from your LiveKit console.</p>
                    </div>

                    <!-- Error State -->
                    <div id="outbound-error-state" class="text-center py-8 hidden">
                        <i data-feather="alert-circle" class="w-10 h-10 text-red-300 mx-auto mb-3"></i>
                        <p class="text-gray-700 mb-3" id="outbound-error-message">Unable to load outbound trunks.</p>
                        <button id="outbound-retry-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 text-sm font-medium">Try again</button>
                    </div>
                </section>

                <!-- Outbound Edit Panel -->
                <div id="outbound-edit-panel" class="mt-10 bg-white border border-gray-200 rounded-xl shadow-sm p-6 hidden">
                    <h2 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
                        <i data-feather="edit-2" class="w-5 h-5 text-blue-500"></i>
                        Outbound Trunk Configuration
                    </h2>

                    <!-- General fields (name, address, credentials, metadata) -->
                    <form id="outbound-general-form" class="space-y-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <input type="text" id="outbound-edit-name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">SIP Address</label>
                                <input type="text" id="outbound-edit-address" placeholder="sip.example.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Transport</label>
                                <select id="outbound-edit-transport" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                                    <option value="">Select transport</option>
                                    <option value="udp">UDP</option>
                                    <option value="tcp">TCP</option>
                                    <option value="tls">TLS</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Auth Username</label>
                                <input type="text" id="outbound-edit-auth-username" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Auth Password</label>
                                <input type="password" id="outbound-edit-auth-password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Metadata (optional)</label>
                            <textarea id="outbound-edit-metadata" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm" placeholder='Optional metadata string or JSON'></textarea>
                        </div>
                        <div class="flex justify-end pt-2">
                            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">Save General Settings</button>
                        </div>
                    </form>

                    <!-- Numbers management -->
                    <div class="border-t border-gray-100 pt-6 mt-4">
                        <div class="flex items-center justify-between mb-3">
                            <div>
                                <h3 class="text-sm font-semibold text-gray-900">Numbers</h3>
                                <p class="text-xs text-gray-500">Manage the numbers configured on this outbound trunk.</p>
                            </div>
                        </div>
                        <div id="outbound-numbers-list" class="flex flex-wrap gap-2 mb-3 text-sm"></div>
                        <form id="outbound-numbers-form" class="flex flex-col sm:flex-row gap-2 items-stretch sm:items-center">
                            <input type="text" id="outbound-edit-numbers-to-add" placeholder="Comma-separated numbers to add" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm">
                            <button type="submit" class="px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg text-sm font-medium hover:bg-blue-100">Add Numbers</button>
                        </form>
                    </div>

                    <div class="flex justify-end gap-3 pt-6 mt-6 border-t border-gray-100">
                        <button type="button" id="outbound-edit-cancel" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Close</button>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <div id="toast" class="fixed bottom-4 right-4 left-4 sm:left-auto px-6 py-3 bg-gray-900 text-white rounded-lg shadow-lg hidden z-50 text-center sm:text-left" role="alert">
        <p id="toast-message"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="../assets/scripts/config.js?v=1"></script>
    <script src="../assets/scripts/api.js?v=3"></script>
    <script src="../assets/scripts/ui.js"></script>
    <script src="../assets/scripts/layout.js"></script>
    <script src="../assets/scripts/trunks_outbound.js"></script>
</body>
</html>
